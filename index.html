<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jejum - Movidos pelo Espírito</title>
    
    <link rel="icon" type="image/png" href="img/icone.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <img src="img/icone.png" alt="Coração em Chamas" class="hero-logo">
            
            <h1>JEJUM COM PROPÓSITO</h1>
            <p class="subtitle">CONGRESSO JOVEM 2026 &bull; MOVIDOS PELO ESPÍRITO</p>
            <p class="slogan">"Se vivemos no Espírito, andemos também no Espírito."</p>
        </div>
    </header>

    <div class="container">
        <!-- Dashboard de Status -->
        <div class="dashboard">
            <div class="dash-card">
                <div class="dash-header">
                    <span>PROGRESSO GERAL</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
                </div>
                <div class="dash-value" id="global-percent">0%</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="global-bar"></div>
                </div>
                <div class="dash-subtext" id="global-text">0 de 125 atividades</div>
            </div>

            <div class="dash-card">
                <div class="dash-header">
                    <span>DIAS COMPLETOS</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <div class="dash-value" id="days-completed">0</div>
                <div class="dash-subtext">de 25 dias com todas as atividades</div>
            </div>

            <div class="dash-card verse-card">
                <div class="dash-header">
                    <span>VERSÍCULO DE HOJE</span>
                </div>
                <div class="dash-verse" id="daily-verse">"Carregando..."</div>
                <div class="dash-subtext verse-ref" id="daily-ref"></div>
            </div>
        </div>

        <div id="weeks-container"></div>

        <button id="btn-share" class="share-btn">
            Compartilhar Meu Progresso no WhatsApp
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
